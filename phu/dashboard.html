<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng điều khiển Logistics Thời tiết Thông minh</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Thư viện D3.js từ CDN -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div class="dashboard-container">
    <!-- TOP BAR / HEADER -->
    <header class="main-header">
      <div class="brand">
        <div class="logo-icon"></div>
        <div class="title-area">
          <h1>Hệ Thống Điều Phối Vận Tải Theo Thời Tiết</h1>
          <p>Giám sát thời gian thực & Phân tích rủi ro Logistics</p>
        </div>
      </div>
      
      <!-- BỘ LỌC ĐỘNG (Cập nhật tức thì khi nhấn, bỏ nút Áp dụng/Xuất) -->
      <div class="filter-panel">
        <div class="filter-item">
          <span class="filter-label">Thành phố</span>
          <select id="city-select" class="custom-select">
          </select>
        </div>
        <div class="filter-item">
          <span class="filter-label">Năm</span>
          <select id="year-select" class="custom-select">
          </select>
        </div>
        <div class="filter-item">
          <span class="filter-label">Tháng</span>
          <select id="month-select" class="custom-select">
          </select>
        </div>
      </div>
    </header>

    <!-- MAIN DASHBOARD GRID (Full-screen, không cuộn) -->
    <main class="dashboard-grid">
      <!-- DÒNG TRÊN: Lượng Mưa (Rain) -->
      <section class="grid-card col-4" id="card-rain">
        <div class="card-header-v2">
          <div class="card-title-block">
            <h2>Lượng Mưa</h2>
          </div>
          <div class="card-legend">
            <span class="legend-dot" style="background:#3b82f6;"></span>
            <span>(mm)</span>
          </div>
        </div>
        <div class="chart-wrapper" id="rain-chart"></div>
      </section>

      <!-- DÒNG TRÊN: Sức Gió (Wind) -->
      <section class="grid-card col-4" id="card-wind">
        <div class="card-header-v2">
          <div class="card-title-block">
            <h2>Sức Gió</h2>
          </div>
          <div class="card-legend">
            <span class="legend-dot" style="background:#86efac;"></span>
            <span>(km/h)</span>
          </div>
        </div>
        <div class="chart-wrapper" id="wind-chart"></div>
      </section>

      <!-- DÒNG TRÊN: Tầm Nhìn (Vision) -->
      <section class="grid-card col-4" id="card-vision">
        <div class="card-header-v2">
          <div class="card-title-block">
            <h2>Tầm Nhìn</h2>
          </div>
          <div class="card-legend">
            <span class="legend-dot" style="background:#d4d4aa;"></span>
            <span>(km)</span>
          </div>
        </div>
        <div class="chart-wrapper" id="vision-chart"></div>
      </section>

      <!-- DÒNG DƯỚI: Xếp hạng rủi ro vận chuyển với màu sắc trực quan tương ứng mức độ -->
      <section class="grid-card col-12" id="card-risk">
        <div class="card-header-v2">
          <div class="card-title-block">
            <h2>Chỉ Số Rủi Ro Theo Thời Gian</h2>
            <p>Sự biến động mức độ rủi ro qua các ngày</p>
          </div>
          <!-- CHÚ THÍCH (LEGEND) -->
          <div class="card-legend">
            <span class="legend-item"><span class="legend-dot r-low"></span>Thấp</span>
            <span class="legend-item"><span class="legend-dot r-med"></span>Trung bình</span>
            <span class="legend-item"><span class="legend-dot r-high"></span>Cao</span>
          </div>
        </div>
        <div class="chart-wrapper" id="risk-line-chart"></div>
      </section>
    </main>
  </div>
  <div id="rain-tooltip" class="chart-tooltip" aria-hidden="true"></div>
  <div id="wind-tooltip" class="chart-tooltip" aria-hidden="true"></div>
  <div id="vision-tooltip" class="chart-tooltip" aria-hidden="true"></div>
  <div id="risk-tooltip" class="chart-tooltip" aria-hidden="true"></div>

  <!-- Dự phòng dữ liệu mẫu để Dashboard hiển thị ngay lập tức nếu chưa có file CSV thực tế -->
  <script>
    let globalDataset = [];
    let riskNodeByLabel = new Map();
    let rainNodeByLabel = new Map();
    let windNodeByLabel = new Map();
    let visionNodeByLabel = new Map();
    let dailyDataGlobal = [];

    // Khởi tạo Dashboard
    async function init() {
      try {
        // Cố gắng tải từ file thực tế trước
        const rawData = await d3.csv("../dataset/dataset.csv");
        processAndAssignData(rawData);
      } catch (e) {
        console.warn("Không tìm thấy dataset.csv, sử dụng dữ liệu mẫu dự phòng để dựng giao diện.");
      }

      setupFilterListeners();
      updateDashboard();
      window.addEventListener("resize", updateDashboard);
    }

    // Tiền xử lý dữ liệu và đổi chữ viết tắt "Đồng Bằng" -> "ĐB"
    function processAndAssignData(data) {
      globalDataset = data.map(d => {
        let region = d["location.region"] || "";
        // Viết tắt chữ Đồng Bằng thành ĐB theo yêu cầu
        region = region.replace(/Đồng Bằng/g, "ĐB").replace(/đồng bằng/g, "ĐB");
        const dateParsed = d3.timeParse("%Y-%m-%d")(d.date) || new Date(d.date);
        return {
          ...d,
          "location.region": region,
          "location.name": d["location.name"] || region,
          dateParsed,
          year: dateParsed.getFullYear(),
          month: dateParsed.getMonth() + 1,
          temp: +d["day.avgtemp_c"] || 0,
          rain: +d["day.totalprecip_mm"] || 0,
          wind: +d["day.maxwind_kph"] || 0,
          vis: +d["day.avgvis_km"] || 10
        };
      });

      // Tạo các lựa chọn cho thẻ chọn Thành phố
      const uniqueCities = [...new Set(globalDataset.map(d => d["location.name"]))].filter(Boolean);
      const citySelect = document.getElementById("city-select");
      
      // Xóa các option cũ
      citySelect.innerHTML = "";
      
      uniqueCities.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        citySelect.appendChild(opt);
      });

      // Tạo các lựa chọn cho thẻ chọn Năm
      const uniqueYears = [...new Set(globalDataset.map(d => d.year))].filter(Boolean).sort((a, b) => a - b);
      const yearSelect = document.getElementById("year-select");

      yearSelect.innerHTML = "";
      uniqueYears.forEach(year => {
        const opt = document.createElement("option");
        opt.value = year;
        opt.textContent = year;
        yearSelect.appendChild(opt);
      });

      // Tạo các lựa chọn cho thẻ chọn Tháng
      const uniqueMonths = [...new Set(globalDataset.map(d => d.month))].filter(Boolean).sort((a, b) => a - b);
      const monthSelect = document.getElementById("month-select");

      monthSelect.innerHTML = "";
      uniqueMonths.forEach(month => {
        const opt = document.createElement("option");
        opt.value = month;
        opt.textContent = `Tháng ${month}`;
        monthSelect.appendChild(opt);
      });
    }

    // Thiết lập sự kiện thay đổi bộ lọc lập tức cập nhật biểu đồ (Reactive)
    function setupFilterListeners() {
      document.getElementById("city-select").addEventListener("change", updateDashboard);
      document.getElementById("year-select").addEventListener("change", updateDashboard);
      document.getElementById("month-select").addEventListener("change", updateDashboard);
    }

    // Hàm tổng điều phối lọc dữ liệu và vẽ lại biểu đồ
    function updateDashboard() {
      const selectedCity = document.getElementById("city-select").value;
      const selectedYear = document.getElementById("year-select").value;
      const selectedMonth = document.getElementById("month-select").value;

      let filteredData = globalDataset;
      if (selectedYear) {
        filteredData = filteredData.filter(d => d.year === Number(selectedYear));
      }

      if (selectedMonth) {
        filteredData = filteredData.filter(d => d.month === Number(selectedMonth));
      }

      if (selectedCity) {
        filteredData = filteredData.filter(d => d["location.name"] === selectedCity);
      }

      // Xử lý gom nhóm dữ liệu theo ngày
      const dateGroups = d3.groups(filteredData, d => d.date);
      let dailyData = dateGroups.map(([dateStr, records]) => {
        const temp = d3.mean(records, r => r.temp);
        const rain = d3.mean(records, r => r.rain);
        const wind = d3.mean(records, r => r.wind);
        const vis = d3.mean(records, r => r.vis);
        const score = (0.5 * rain + 0.3 * wind + 0.2 * (1 - vis));
        
        let level = "low";
        if (score > 66) level = "high";
        else if (score > 33) level = "medium";
        
        const parseTime = d3.timeParse("%I:%M %p");
        // Lấy bình minh, hoàng hôn của record đầu tiên trong nhóm
        const sunriseData = records[0]["astro.sunrise"] || "06:00 AM";
        const sunsetData = records[0]["astro.sunset"] || "06:00 PM";
        const sunrise = parseTime(sunriseData);
        const sunset = parseTime(sunsetData);
        const durationHours = Math.max(0, (sunset - sunrise) / 36e5);

        return {
          dateStr,
          date: records[0].dateParsed,
          temp,
          rain,
          wind,
          vis,
          score,
          level,
          sunrise,
          sunset,
          durationHours
        };
      }).sort((a, b) => a.date - b.date);
      
      dailyDataGlobal = dailyData;

      // Tiến hành dựng lại biểu đồ
      drawRainChart(dailyDataGlobal);
      drawWindChart(dailyDataGlobal);
      drawVisionChart(dailyDataGlobal);
      drawRiskLineChart(dailyDataGlobal);
    }

    function positionTooltipNearNode(selector, node) {
      if (!node) return;
      const rect = node.getBoundingClientRect();
      d3.select(selector)
        .style("left", `${window.scrollX + rect.right + 12}px`)
        .style("top", `${window.scrollY + rect.top + rect.height / 2 - 18}px`);
    }

    function showTooltip(selector, html, node) {
      d3.select(selector)
        .attr("aria-hidden", "false")
        .html(html)
        .style("opacity", 1);
      positionTooltipNearNode(selector, node);
    }

    function hideTooltips() {
      d3.selectAll("#rain-tooltip, #wind-tooltip, #vision-tooltip, #risk-tooltip")
        .attr("aria-hidden", "true")
        .style("opacity", 0);
      d3.selectAll(".hover-line").style("opacity", 0);
    }

    function basicTooltipHtml(date, label, value, unit) {
      const formatTime = d3.timeFormat("%d/%m/%Y");
      return `
        <div class="tooltip-title">${formatTime(date)}</div>
        <div class="tooltip-row"><span>${label}</span><strong>${value.toFixed(1)} ${unit}</strong></div>
      `;
    }

    function riskLevelText(level) {
      if (level === "high") return "Cao";
      if (level === "medium") return "Trung bình";
      return "Thấp";
    }

    function formatTimelineTime(dateValue) {
      return d3.timeFormat("%H:%M")(dateValue);
    }

    function riskTooltipHtml(d) {
      const formatTime = d3.timeFormat("%d/%m/%Y");
      return `
        <div class="tooltip-title">${formatTime(d.date)}</div>
        <div class="tooltip-row"><span>Chỉ số rủi ro</span><strong>${d.score.toFixed(1)}</strong></div>
        <div class="tooltip-row"><span>Mức rủi ro</span><strong>${riskLevelText(d.level)}</strong></div>
      `;
    }

    function showLinkedTooltips(dateStr) {
      const dataPoint = dailyDataGlobal.find(d => d.dateStr === dateStr);
      if (!dataPoint) return;

      const rNode = riskNodeByLabel.get(dateStr);
      if (rNode) {
        showTooltip("#risk-tooltip", riskTooltipHtml(dataPoint), rNode);
        const cx = d3.select(rNode).attr("cx");
        d3.select("#risk-hover-line").attr("x1", cx).attr("x2", cx).style("opacity", 1);
      }

      const rnNode = rainNodeByLabel.get(dateStr);
      if (rnNode) {
        showTooltip("#rain-tooltip", basicTooltipHtml(dataPoint.date, "Lượng mưa", dataPoint.rain, "mm"), rnNode);
        const cx = d3.select(rnNode).attr("cx");
        d3.select("#rain-hover-line").attr("x1", cx).attr("x2", cx).style("opacity", 1);
      }

      const wnNode = windNodeByLabel.get(dateStr);
      if (wnNode) {
        showTooltip("#wind-tooltip", basicTooltipHtml(dataPoint.date, "Sức gió", dataPoint.wind, "km/h"), wnNode);
        const xPos = parseFloat(d3.select(wnNode).attr("x")) + parseFloat(d3.select(wnNode).attr("width")) / 2;
        d3.select("#wind-hover-line").attr("x1", xPos).attr("x2", xPos).style("opacity", 1);
      }

      const vsNode = visionNodeByLabel.get(dateStr);
      if (vsNode) {
        showTooltip("#vision-tooltip", basicTooltipHtml(dataPoint.date, "Tầm nhìn", dataPoint.vis, "km"), vsNode);
        const cx = d3.select(vsNode).attr("cx");
        d3.select("#vision-hover-line").attr("x1", cx).attr("x2", cx).style("opacity", 1);
      }
    }

    // --- BIỂU ĐỒ LƯỢNG MƯA ---
    function drawRainChart(displayData) {
      const containerId = "rain-chart";
      const container = document.getElementById(containerId);
      const width = container.clientWidth;
      const height = container.clientHeight;
      d3.select(`#${containerId}`).selectAll("*").remove();

      rainNodeByLabel = new Map();

      const margin = { top: 15, right: 15, bottom: 25, left: 35 };
      const chartW = width - margin.left - margin.right;
      const chartH = height - margin.top - margin.bottom;
      if (chartW <= 0 || chartH <= 0 || !displayData.length) return;

      const svg = d3.select(`#${containerId}`)
        .append("svg").attr("width", width).attr("height", height)
        .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleTime().domain(d3.extent(displayData, d => d.date)).range([0, chartW]);
      const y = d3.scaleLinear().domain([0, d3.max(displayData, d => d.rain) + 5 || 20]).range([chartH, 0]).nice();

      svg.append("g").attr("class", "grid-lines").call(d3.axisLeft(y).ticks(5).tickSize(-chartW).tickFormat(""));

      const areaGenerator = d3.area().x(d => x(d.date)).y0(chartH).y1(d => y(d.rain)).curve(d3.curveMonotoneX);
      const lineGenerator = d3.line().x(d => x(d.date)).y(d => y(d.rain)).curve(d3.curveMonotoneX);

      // Thêm màu Gradient mượt mà cho miền lượng mưa
      const defs = svg.append("defs");
      const gradient = defs.append("linearGradient").attr("id", "rain-gradient").attr("x1", "0%").attr("y1", "0%").attr("x2", "0%").attr("y2", "100%");
      gradient.append("stop").attr("offset", "0%").attr("stop-color", "#3b82f6").attr("stop-opacity", 0.35);
      gradient.append("stop").attr("offset", "100%").attr("stop-color", "#3b82f6").attr("stop-opacity", 0.00);

      svg.append("path").datum(displayData).attr("d", areaGenerator).attr("fill", "url(#rain-gradient)");
      svg.append("path").datum(displayData).attr("d", lineGenerator).attr("fill", "none").attr("stroke", "#3b82f6").attr("stroke-width", 2.5);

      // Vạch kẻ đứt khi Hover
      svg.append("line").attr("id", "rain-hover-line").attr("class", "hover-line")
        .attr("y1", 0).attr("y2", chartH).style("stroke", "#94a3b8").style("stroke-width", 1.5)
        .style("stroke-dasharray", "4 4").style("opacity", 0).style("pointer-events", "none");

      svg.selectAll(".rain-dot")
        .data(displayData).enter().append("circle").attr("class", "rain-dot")
        .attr("cx", d => x(d.date)).attr("cy", d => y(d.rain)).attr("r", 4)
        .attr("fill", "#fff")
        .attr("stroke", "#3b82f6")
        .attr("stroke-width", 1.5)
        .each(function(d) {
          rainNodeByLabel.set(d.dateStr, this);
        })
        .on("mouseover", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mousemove", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mouseout", hideTooltips);

      svg.append("g").attr("transform", `translate(0,${chartH})`).attr("class", "axis-x")
        .call(d3.axisBottom(x).ticks(Math.min(chartW / 65, 6)).tickFormat(d => `T${d.getMonth() + 1}/${d.getDate()}`));
      svg.append("g").attr("class", "axis-y").call(d3.axisLeft(y).ticks(5));
    }

    // --- BIỂU ĐỒ SỨC GIÓ (Bar Chart) ---
    function drawWindChart(chartData) {
      const containerId = "wind-chart";
      const container = document.getElementById(containerId);
      const width = container.clientWidth;
      const height = container.clientHeight;
      d3.select(`#${containerId}`).selectAll("*").remove();

      windNodeByLabel = new Map();

      const margin = { top: 15, right: 15, bottom: 25, left: 35 };
      const chartW = width - margin.left - margin.right;
      const chartH = height - margin.top - margin.bottom;
      if (chartW <= 0 || chartH <= 0 || !chartData.length) return;

      const svg = d3.select(`#${containerId}`)
        .append("svg").attr("width", width).attr("height", height)
        .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleBand().domain(chartData.map(d => d.dateStr)).range([0, chartW]).padding(0.2);
      const y = d3.scaleLinear().domain([0, d3.max(chartData, d => d.wind) + 5 || 25]).range([chartH, 0]).nice();

      svg.append("g").attr("class", "grid-lines").call(d3.axisLeft(y).ticks(5).tickSize(-chartW).tickFormat(""));

      // Vạch kẻ đứt khi Hover
      svg.append("line").attr("id", "wind-hover-line").attr("class", "hover-line")
        .attr("y1", 0).attr("y2", chartH).style("stroke", "#94a3b8").style("stroke-width", 1.5)
        .style("stroke-dasharray", "4 4").style("opacity", 0).style("pointer-events", "none");

      svg.selectAll(".bar")
        .data(chartData).enter().append("rect").attr("class", "bar")
        .attr("x", d => x(d.dateStr))
        .attr("y", d => y(d.wind))
        .attr("width", x.bandwidth())
        .attr("height", d => Math.max(0, chartH - y(d.wind)))
        .attr("fill", "#86efac")
        .attr("rx", 3)
        .each(function(d) {
          windNodeByLabel.set(d.dateStr, this);
        })
        .on("mouseover", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mousemove", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mouseout", hideTooltips);

      svg.append("g").attr("transform", `translate(0,${chartH})`).attr("class", "axis-x")
        .call(d3.axisBottom(x).tickValues(x.domain().filter((d,i) => !(i%Math.ceil(chartData.length/6))))
        .tickFormat(d => {
          const pt = d3.timeParse("%Y-%m-%d")(d);
          return pt ? `T${pt.getMonth() + 1}/${pt.getDate()}` : d; 
        }));
      svg.append("g").attr("class", "axis-y").call(d3.axisLeft(y).ticks(5));
    }

    // --- BIỂU ĐỒ TẦM NHÌN ---
    function drawVisionChart(displayData) {
      const containerId = "vision-chart";
      const container = document.getElementById(containerId);
      const width = container.clientWidth;
      const height = container.clientHeight;
      d3.select(`#${containerId}`).selectAll("*").remove();

      visionNodeByLabel = new Map();

      const margin = { top: 15, right: 15, bottom: 25, left: 35 };
      const chartW = width - margin.left - margin.right;
      const chartH = height - margin.top - margin.bottom;
      if (chartW <= 0 || chartH <= 0 || !displayData.length) return;

      const svg = d3.select(`#${containerId}`)
        .append("svg").attr("width", width).attr("height", height)
        .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleTime().domain(d3.extent(displayData, d => d.date)).range([0, chartW]);
      const y = d3.scaleLinear().domain([0, d3.max(displayData, d => d.vis) + 2 || 15]).range([chartH, 0]).nice();

      svg.append("g").attr("class", "grid-lines").call(d3.axisLeft(y).ticks(5).tickSize(-chartW).tickFormat(""));

      const lineGenerator = d3.line().x(d => x(d.date)).y(d => y(d.vis)).curve(d3.curveMonotoneX);

      svg.append("path").datum(displayData).attr("d", lineGenerator).attr("fill", "none").attr("stroke", "#d4d4aa").attr("stroke-width", 2.5);

      // Vạch kẻ đứt khi Hover
      svg.append("line").attr("id", "vision-hover-line").attr("class", "hover-line")
        .attr("y1", 0).attr("y2", chartH).style("stroke", "#94a3b8").style("stroke-width", 1.5)
        .style("stroke-dasharray", "4 4").style("opacity", 0).style("pointer-events", "none");

      svg.selectAll(".vision-dot")
        .data(displayData).enter().append("circle").attr("class", "vision-dot")
        .attr("cx", d => x(d.date)).attr("cy", d => y(d.vis)).attr("r", 4)
        .attr("fill", "#fff")
        .attr("stroke", "#d4d4aa")
        .attr("stroke-width", 1.5)
        .each(function(d) {
          visionNodeByLabel.set(d.dateStr, this);
        })
        .on("mouseover", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mousemove", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mouseout", hideTooltips);

      svg.append("g").attr("transform", `translate(0,${chartH})`).attr("class", "axis-x")
        .call(d3.axisBottom(x).ticks(Math.min(chartW / 65, 6)).tickFormat(d => `T${d.getMonth() + 1}/${d.getDate()}`));
      svg.append("g").attr("class", "axis-y").call(d3.axisLeft(y).ticks(5));
    }

    // --- BIỂU ĐỒ RISK LINE CHART ---
    function drawRiskLineChart(chartData) {
      const containerId = "risk-line-chart";
      const container = document.getElementById(containerId);
      if (!container) return;
      
      const width = container.clientWidth;
      const height = container.clientHeight;
      d3.select(`#${containerId}`).selectAll("*").remove();

      riskNodeByLabel = new Map();

      const margin = { top: 15, right: 15, bottom: 25, left: 45 };
      const chartW = width - margin.left - margin.right;
      const chartH = height - margin.top - margin.bottom;
      if (chartW <= 0 || chartH <= 0 || !chartData.length) return;

      const svg = d3.select(`#${containerId}`)
        .append("svg").attr("width", width).attr("height", height)
        .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const x = d3.scaleTime().domain(d3.extent(chartData, d => d.date)).range([0, chartW]);
      const y = d3.scaleLinear().domain([0, d3.max(chartData, d => d.score) + 10 || 50]).range([chartH, 0]).nice();

      svg.append("g").attr("class", "grid-lines").call(d3.axisLeft(y).ticks(5).tickSize(-chartW).tickFormat(""));

      const lineGen = d3.line().x(d => x(d.date)).y(d => y(d.score)).curve(d3.curveMonotoneX);

      svg.append("path")
        .datum(chartData)
        .attr("fill", "none")
        .attr("stroke", "#64748b")
        .attr("stroke-width", 2)
        .attr("d", lineGen);

      // Vạch kẻ đứt khi Hover
      svg.append("line").attr("id", "risk-hover-line").attr("class", "hover-line")
        .attr("y1", 0).attr("y2", chartH).style("stroke", "#94a3b8").style("stroke-width", 1.5)
        .style("stroke-dasharray", "4 4").style("opacity", 0).style("pointer-events", "none");

      svg.selectAll(".risk-dot")
        .data(chartData).enter().append("circle").attr("class", "risk-dot")
        .attr("cx", d => x(d.date)).attr("cy", d => y(d.score)).attr("r", 5)
        .attr("fill", d => {
          if (d.level === "high") return "#ef4444";
          if (d.level === "medium") return "#f59e0b";
          return "#10b981";
        })
        .each(function(d) {
          riskNodeByLabel.set(d.dateStr, this);
        })
        .on("mouseover", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mousemove", (event, d) => showLinkedTooltips(d.dateStr))
        .on("mouseout", hideTooltips);

      svg.append("g").attr("class", "axis-y").call(d3.axisLeft(y).ticks(5));
      svg.append("g").attr("transform", `translate(0,${chartH})`).attr("class", "axis-x")
         .call(d3.axisBottom(x).ticks(Math.min(chartW / 65, 6)).tickFormat(d => `T${d.getMonth() + 1}/${d.getDate()}`));
    }

    // Kích hoạt toàn hệ thống bảng điều khiển điều hướng thông minh
    init();
  </script>
</body>
</html>
