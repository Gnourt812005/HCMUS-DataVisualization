<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Weather Dashboards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #10b981;
            --accent-secondary: #3b82f6;
            --accent-tertiary: #a855f7;
            --border-color: #243049;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 24px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "Outfit", sans-serif;
            line-height: 1.5;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            padding-bottom: 20px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            background: linear-gradient(to right, #60a5fa, #10b981, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            max-width: 680px;
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 18px;
        }

        .dashboard-card {
            min-height: 150px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .dashboard-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .card-name {
            font-size: 20px;
            font-weight: 700;
        }

        .card-path {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .card-action {
            color: #34d399;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 1000px) {
            .dashboard-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 16px;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main>
        <header>
            <h1>Vietnam Weather Dashboards</h1>
            <p>Chọn một dashboard để xem phần trực quan hóa dữ liệu khí tượng.</p>
        </header>

        <section class="dashboard-grid" aria-label="Danh sách dashboard">
            <a class="dashboard-card" href="khoa/dashboard.html">
                <span class="card-name">Khoa</span>
                <span class="card-path">khoa/dashboard.html</span>
                <span class="card-action">Open dashboard</span>
            </a>

            <a class="dashboard-card" href="phu/dashboard.html">
                <span class="card-name">Phu</span>
                <span class="card-path">phu/dashboard.html</span>
                <span class="card-action">Open dashboard</span>
            </a>

            <a class="dashboard-card" href="quang/dashboard.html">
                <span class="card-name">Quang</span>
                <span class="card-path">quang/dashboard.html</span>
                <span class="card-action">Open dashboard</span>
            </a>

            <a class="dashboard-card" href="thu/dashboard.html">
                <span class="card-name">Thu</span>
                <span class="card-path">thu/dashboard.html</span>
                <span class="card-action">Open dashboard</span>
            </a>

            <a class="dashboard-card" href="truong/dashboard.html">
                <span class="card-name">Truong</span>
                <span class="card-path">truong/dashboard.html</span>
                <span class="card-action">Open dashboard</span>
            </a>
        </section>
    </main>
</body>

</html>
